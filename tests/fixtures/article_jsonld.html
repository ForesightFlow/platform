<!DOCTYPE html>
<html>
<head>
  <title>Test Article with JSON-LD</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "headline": "Iran agrees to nuclear deal",
    "datePublished": "2024-03-15T09:30:00Z",
    "dateModified": "2024-03-15T11:00:00Z",
    "author": {"@type": "Person", "name": "Jane Doe"},
    "publisher": {"@type": "Organization", "name": "Example News"}
  }
  </script>
</head>
<body>
  <h1>Iran agrees to nuclear deal</h1>
  <p>Published March 15, 2024.</p>
</body>
</html>
