services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: fflow
      POSTGRES_PASSWORD: fflow
      POSTGRES_DB: fflow
    ports:
      - "5432:5432"
    volumes:
      - fflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fflow -d fflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fflow_pgdata:
